<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGITA - Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    
    <div class="bg"></div>

    <main class="layout">
        <aside class="brand-panel">
            <div class="brand-content">
                <h1 class="brand-name">SGITA</h1>
                <p class="brand-tagline">Sistema de Gestión Inteligente<br>de Trazabilidad Alimentaria</p>
                <div class="brand-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </aside>

        <section class="form-panel">
            <div class="form-card" id="card">
                <div class="view" id="view-login">
                    <header class="card-header">
                        <h2>Bienvenido</h2>
                        <p>Introduce tus credenciales para acceder</p>
                    </header>

                    <form id="form-login" novalidate>

                        <div class="field" id="field-email">
                            <label for="email">Correo electrónico</label>
                            <div class="input-wrap">
                                <svg class="input-icon" viewbox="0 0 20 20" fill="none">
                                    <path d="M2.5 5.5A1.5 1.5 0 014 4h12a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.4"/> 
                                    <path d="M2.5 6l7.09 4.6a.8.8 0 00.82 0L17.5 6" stroke="currentColor" stroke-width="1.4"/>
                                </svg>
                                <input type="email" id="email" name="email" placeholder="empleado@restaurante.com" autocomplete="email" required/>
                            </div>
                            <span class="field-error" id="error-email"></span>
                        </div>

                        <div class="field" id="field-password">
                            <label for="password">Contraseña</label>
                            <div class="input-wrap">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="none">
                                    <rect x="4" y="9" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                                    <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                                </svg>
                                <input type="password" id="password" name="password" placeholder="**********" autocomplete="current-password" required/>
                                <button type="button" class="toggle-pass" id="toggle-pass" aria-label="Mostrar contraseña" tabindex="-1">
                                    <svg id="icon-eye" viewBox="0 0 20 20" fill="none">
                                        <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.4"/>
                                        <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
                                    </svg>
                                    <svg id="icon-eye-off" viewBox="0 0 20 20" fill="none" style="display:none">
                                        <path d="M3 3l14 14M8.46 8.52A2.5 2.5 0 0012.5 12.5M5 5.5C3.1 6.9 2 9 2 9s3 5.5 8 5.5c1.5 0 2.9-.4 4-1.1M9 4.6C9.3 4.5 9.65 4.5 10 4.5c5 0 8 4.5 8 4.5s-.8 1.5-2.2 2.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                            <span class="field-error" id="error-password"></span>
                        </div>

                        <div class="form-footer-row">
                            <button type="button" class="link-btn" id="btn-forgot">¿Olvidaste tu contraseña?</button>
                        </div>

                        <div class="alert alert-error" id="alert-login" role="alert" style="display: none;"></div>

                        <button type="submit" class="btn-primary" id="btn-login">
                            <span class="btn-text">Entrar</span>
                            <span class="btn-loader" style="display: none;">
                                 <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="32" stroke-dashoffset="12"/>
                            </span>
                        </button>
                    </form>
                </div>

                <div class="view" id="view-forgot" style="display: none;">
                    <header class="card-header">
                        <h2>Recuperar contraseña</h2>
                        <p>Introduce tu email y te enviaremos un enlace para restablecer tu contraseña</p>
                    </header>

                    <form id="form-forgot" novalidate>

                        <div class="field" id="field-forgot-email">
                            <label for="forgot-email">Correo electrónico</label>
                            <div class="input-wrap">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="none">
                                    <path d="M2.5 5.5A1.5 1.5 0 014 4h12a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.4"/>
                                    <path d="M2.5 6l7.09 4.6a.8.8 0 00.82 0L17.5 6" stroke="currentColor" stroke-width="1.4"/>
                                </svg>
                                <input type="email" id="forgot-email" name="forgot-email" placeholder="empleado@restaurante.com" autocomplete="email" required>
                            </div>
                            <span class="field-error" id="error-forgot-email"></span>
                        </div>

                        <div class="alert alert-success" id="alert-forgot-ok" role="alert" style="display: none;"></div>
                        <div class="alert alert-error" id="alert-forgot-err" role="alert" style="display: none;"></div>

                        <button type="button" class="link-btn back-btn" id="btn-back"><- Volver al inicio de sesión</button>

                    </form>
                </div>

            </div>

            <footer class="form-footer">
                <span>© 2026 SGITA</span>
            </footer>
        </section>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
